name: CI - Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r aula_01_e02_fastapi/requirements.txt

      - name: Diagnostico do ambiente
        run: |
          echo "Python"
          python --version

          echo "Dependencias instaladas"
          pip list

          echo "Arquivos do projeto"
          test -f aula_01_e02_fastapi/main.py && echo "main.py presente" || echo "main.py ausente"
          test -f aula_01_e02_fastapi/requirements.txt && echo "requirements.txt presente" || echo "requirements.txt ausente"
          test -d aula_01_e02_fastapi/tests && echo "tests presente" || echo "tests ausente"

      - name: Diagnostico do Black e do conftest
        run: |
          cd aula_01_e02_fastapi
          python -m black --version
          python -c "from pathlib import Path; p = Path('tests/conftest.py'); print('Arquivo:', p); print('Existe:', p.exists()); print('Tamanho em bytes:', len(p.read_bytes())); print('Conteudo repr:'); print(repr(p.read_text()))"

      - name: Verificar formatacao
        run: |
          cd aula_01_e02_fastapi
          python -m black --check .

      - name: Verificar imports nao utilizados
        run: |
          cd aula_01_e02_fastapi
          python -m autoflake --check --remove-all-unused-imports -r .

      - name: Rodar testes smoke
        run: |
          cd aula_01_e02_fastapi
          python -m pytest tests/ -m "smoke or validacao" -v --tb=short

  integracao:
    runs-on: ubuntu-latest
    needs: qualidade
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r aula_01_e02_fastapi/requirements.txt

      - name: Cache do modelo Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('aula_01_e02_fastapi/requirements.txt') }}

      - name: Diagnostico do ambiente
        run: |
          echo "Python"
          python --version

          echo "Arquivos do projeto"
          test -f aula_01_e02_fastapi/model_utils.py && echo "model_utils.py presente" || echo "model_utils.py ausente"

          echo "Autenticacao"
          if [ -n "$HF_TOKEN" ]; then
            echo "HF_TOKEN definido"
          else
            echo "HF_TOKEN ausente"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Verificar autenticacao com Hugging Face
        run: python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN nao configurado'"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Rodar testes de integracao
        run: |
          cd aula_01_e02_fastapi
          python -m pytest tests/test_modelo.py -m integracao -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: anaclaragr05/mlops-fraud-v1
